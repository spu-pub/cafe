<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-shell">
        <header class="top-nav">
            <div class="brand">
                <div class="brand-text">
                    <span class="brand-name">
                        Coffee Shop ☕
                    </span>
                </div>
            </div>
        </header>
        <main class="content">
            <section class="hero">
                <div class="hero-card">
                    <div class="hero-content">
                        <p class="label">
                            cafe style iced Coffee.
                        </p>
                        <h1>
                            Coffee Shop
                        </h1>
                        <p class="description">
                            Real Coffee
                        </p>
                        <div class="hero-actions">
                            <a href="" class="btn primary">
                                Menu
                            </a>
                            <a href="" class="btn secondary">
                                Access
                            </a>
                        </div>
                    </div>
                </div>
            </section>
            <section class="menu" id="menu">
                <h2>Menu</h2>
                <div class="menu-grid">
                    <article class="menu-card">
                        <div class="thumbnail">
                            <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                                alt="">
                        </div>
                        <div class="menu-body">
                            <h3>Blend Coffee</h3>
                            <div class="menu-price">
                                <p>390円</p>
                            </div>
                        </div>
                    </article>
                    <article class="menu-card">
                        <div class="thumbnail">
                            <img src="https://images.unsplash.com/photo-1502462041640-b3d7e50d0662?q=80&w=871&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                                alt="">
                        </div>
                        <div class="menu-body">
                            <h3>latte</h3>
                            <div class="menu-price">
                                <p>510円</p>
                            </div>
                        </div>
                    </article>
                </div>
            </section>
            <section id="about" class="about">
                <h2>AboutUs</h2>
                <div class="about-image">
                    <img src="https://images.unsplash.com/photo-1528698827591-e19ccd7bc23d?q=80&w=876&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                        alt="">
                </div>
            </section>
        </main>
    </div>
</body>

</html>
